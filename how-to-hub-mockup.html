<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>How To Hub — L.I.N.K. Mockup</title>
<style>
  :root{
    --charcoal:#333333;
    --charcoal-2:#2a2a2a;
    --charcoal-3:#3d3d3d;
    --gold:#FFCD00;
    --offwhite:#F2F2F2;
    --muted:#9a9a9a;
    --line:#474747;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',-apple-system,Tahoma,sans-serif;
    background:#1e1e1e;
    color:var(--offwhite);
    height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ===== HEADER BAR (Container + Image + Label) ===== */
  .header{
    background:var(--charcoal);
    border-bottom:2px solid var(--gold);
    height:64px;
    display:flex;
    align-items:center;
    padding:0 22px;
    flex-shrink:0;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .brand-mark{
    width:38px;height:38px;
    border:2px solid var(--gold);
    border-radius:6px;
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
    font-weight:800;
    font-size:15px;
    letter-spacing:1px;
  }
  .brand-title{
    color:var(--gold);
    font-size:20px;
    font-weight:700;
    letter-spacing:2px;
  }
  .brand-sub{
    color:var(--muted);
    font-size:11px;
    letter-spacing:1px;
    margin-top:1px;
  }
  .role-chip{
    margin-left:auto;
    background:var(--charcoal-3);
    border:1px solid var(--line);
    border-radius:18px;
    padding:7px 16px;
    font-size:13px;
    color:var(--offwhite);
    display:flex;align-items:center;gap:8px;
  }
  .role-chip b{color:var(--gold);font-weight:600;}

  /* ===== BODY: TWO PANE ===== */
  .body{
    flex:1;
    display:flex;
    min-height:0;
  }

  /* ----- LEFT RAIL (selection gallery) ----- */
  .rail{
    width:340px;
    min-width:300px;
    background:var(--charcoal-2);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    flex-shrink:0;
  }
  .rail-controls{
    padding:14px;
    border-bottom:1px solid var(--line);
    flex-shrink:0;
  }
  .search{
    width:100%;
    background:var(--charcoal);
    border:1px solid var(--line);
    border-radius:6px;
    padding:10px 12px;
    color:var(--offwhite);
    font-size:14px;
    margin-bottom:10px;
  }
  .search::placeholder{color:var(--muted);}
  .search:focus{outline:none;border-color:var(--gold);}
  .filter-row{display:flex;gap:8px;}
  .dropdown{
    flex:1;
    background:var(--charcoal);
    border:1px solid var(--line);
    border-radius:6px;
    padding:9px 10px;
    color:var(--offwhite);
    font-size:13px;
  }
  .dropdown:focus{outline:none;border-color:var(--gold);}

  .gallery{
    flex:1;
    overflow-y:auto;
    padding:8px 0;
  }
  .gallery::-webkit-scrollbar{width:8px;}
  .gallery::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .group-label{
    color:var(--gold);
    font-size:11px;
    font-weight:700;
    letter-spacing:1.5px;
    padding:12px 16px 6px;
    text-transform:uppercase;
  }
  .task-item{
    padding:13px 16px 13px 14px;
    border-left:3px solid transparent;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:11px;
    border-bottom:1px solid rgba(255,255,255,0.04);
  }
  .task-item:hover{background:var(--charcoal-3);}
  .task-item.active{
    background:var(--charcoal-3);
    border-left:3px solid var(--gold);
  }
  .task-icon{
    width:30px;height:30px;flex-shrink:0;
    border-radius:6px;
    background:var(--charcoal);
    border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;
    color:var(--gold);
    font-size:15px;
  }
  .task-meta{flex:1;min-width:0;}
  .task-name{
    font-size:14px;
    font-weight:600;
    color:var(--offwhite);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .task-item.active .task-name{color:var(--gold);}
  .freq-tag{
    font-size:10px;
    color:var(--muted);
    letter-spacing:1px;
    text-transform:uppercase;
    margin-top:2px;
  }
  .chevron{color:var(--muted);font-size:14px;}

  /* ----- RIGHT PANEL (detail) ----- */
  .panel{
    flex:1;
    background:var(--charcoal);
    overflow-y:auto;
    padding:30px 36px;
  }
  .panel::-webkit-scrollbar{width:9px;}
  .panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}

  .panel-head{
    border-bottom:1px solid var(--line);
    padding-bottom:18px;
    margin-bottom:24px;
  }
  .panel-title{
    color:var(--gold);
    font-size:27px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .panel-tags{
    display:flex;gap:10px;margin-top:12px;
  }
  .tag{
    background:var(--charcoal-3);
    border:1px solid var(--line);
    border-radius:5px;
    padding:5px 12px;
    font-size:12px;
    color:var(--offwhite);
    letter-spacing:0.5px;
  }
  .tag.gold{
    border-color:var(--gold);
    color:var(--gold);
  }

  .section-label{
    color:var(--gold);
    font-size:13px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:16px;
    display:flex;align-items:center;gap:10px;
  }
  .section-label::after{
    content:"";flex:1;height:1px;background:var(--line);
  }

  .steps{list-style:none;margin-bottom:34px;}
  .step{
    display:flex;
    gap:15px;
    padding:11px 0;
    align-items:flex-start;
  }
  .step-num{
    width:28px;height:28px;flex-shrink:0;
    background:var(--gold);
    color:var(--charcoal);
    border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-weight:800;
    font-size:14px;
  }
  .step-text{
    font-size:15.5px;
    line-height:1.55;
    color:var(--offwhite);
    padding-top:3px;
  }

  .resource-btn{
    display:inline-flex;
    align-items:center;
    gap:11px;
    background:var(--charcoal-3);
    border:1px solid var(--gold);
    border-radius:7px;
    padding:14px 22px;
    color:var(--gold);
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    text-decoration:none;
  }
  .resource-btn:hover{background:var(--gold);color:var(--charcoal);}
  .resource-icon{font-size:18px;}

  .note{
    margin-top:28px;
    padding:14px 16px;
    background:rgba(255,205,0,0.06);
    border-left:3px solid var(--gold);
    border-radius:4px;
    font-size:13px;
    color:var(--muted);
    line-height:1.5;
  }
</style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="brand">
      <div class="brand-mark">LNK</div>
      <div>
        <div class="brand-title">HOW TO HUB</div>
        <div class="brand-sub">L.I.N.K. &nbsp;|&nbsp; TASK LIBRARY</div>
      </div>
    </div>
    <div class="role-chip">Viewing as <b>Station Commander</b> ▾</div>
  </div>

  <!-- BODY -->
  <div class="body">

    <!-- LEFT RAIL -->
    <div class="rail">
      <div class="rail-controls">
        <input class="search" id="search" placeholder="🔍  Search tasks..." oninput="renderGallery()">
        <div class="filter-row">
          <select class="dropdown" id="freqFilter" onchange="renderGallery()">
            <option value="all">All Frequencies</option>
            <option value="Weekly">Weekly</option>
            <option value="Monthly">Monthly</option>
            <option value="Quarterly">Quarterly</option>
          </select>
        </div>
      </div>
      <div class="gallery" id="gallery"></div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="panel" id="panel"></div>

  </div>

<script>
  const tasks = [
    {
      id:1, name:"Future Soldier Training Program", freq:"Weekly", role:"Station Commander", icon:"★",
      steps:[
        "Pull the current FSTP roster from the system of record.",
        "Confirm each Future Soldier's next required training event and date.",
        "Assign the recruiter responsible for each Future Soldier's session.",
        "Conduct or supervise the weekly training event.",
        "Log attendance and update each record before close of business."
      ]
    },
    {
      id:2, name:"Production Counseling", freq:"Weekly", role:"Station Commander", icon:"◆",
      steps:[
        "Review each recruiter's production numbers against the weekly standard.",
        "Identify any recruiter trending below the line.",
        "Conduct one-on-one counseling using the approved counseling form.",
        "Document agreed actions and timeline.",
        "File the signed counseling and set the follow-up date."
      ]
    },
    {
      id:3, name:"Planning Meeting (Station Training)", freq:"Monthly", role:"Station Commander", icon:"▦",
      steps:[
        "Schedule the meeting and notify all station personnel.",
        "Build the agenda from the upcoming month's training requirements.",
        "Review last month's training results and gaps.",
        "Assign owners and dates for each training event.",
        "Publish the finalized monthly training calendar."
      ]
    },
    {
      id:4, name:"NCOER", freq:"Monthly", role:"Station Commander", icon:"▲",
      steps:[
        "Identify any NCOER coming due in the next 60 days.",
        "Confirm rating chain and support form status.",
        "Draft the evaluation against documented performance.",
        "Route through the rating chain for review.",
        "Submit by suspense and confirm receipt."
      ]
    },
    {
      id:5, name:"GOV Logs", freq:"Quarterly", role:"Station Commander", icon:"●",
      steps:[
        "Collect the GOV logbook from each assigned vehicle.",
        "Verify mileage, fuel, and trip entries are complete.",
        "Reconcile against dispatch records.",
        "Correct or annotate any discrepancies.",
        "Submit the quarterly reconciliation to the responsible office."
      ]
    }
  ];

  const freqOrder = ["Weekly","Monthly","Quarterly"];
  let selectedId = 1;

  function renderGallery(){
    const q = document.getElementById('search').value.toLowerCase();
    const f = document.getElementById('freqFilter').value;
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';

    freqOrder.forEach(freq=>{
      if(f!=='all' && f!==freq) return;
      const group = tasks.filter(t=>t.freq===freq && t.name.toLowerCase().includes(q));
      if(group.length===0) return;
      const lbl = document.createElement('div');
      lbl.className='group-label';
      lbl.textContent = freq;
      gallery.appendChild(lbl);
      group.forEach(t=>{
        const item = document.createElement('div');
        item.className='task-item'+(t.id===selectedId?' active':'');
        item.onclick=()=>{selectedId=t.id;renderGallery();renderPanel();};
        item.innerHTML=`
          <div class="task-icon">${t.icon}</div>
          <div class="task-meta">
            <div class="task-name">${t.name}</div>
            <div class="freq-tag">${t.freq} · ${t.role}</div>
          </div>
          <div class="chevron">›</div>`;
        gallery.appendChild(item);
      });
    });
  }

  function renderPanel(){
    const t = tasks.find(x=>x.id===selectedId);
    const panel = document.getElementById('panel');
    panel.innerHTML = `
      <div class="panel-head">
        <div class="panel-title">${t.name}</div>
        <div class="panel-tags">
          <div class="tag gold">${t.freq}</div>
          <div class="tag">${t.role}</div>
        </div>
      </div>
      <div class="section-label">Action Steps</div>
      <ol class="steps">
        ${t.steps.map((s,i)=>`
          <li class="step">
            <div class="step-num">${i+1}</div>
            <div class="step-text">${s}</div>
          </li>`).join('')}
      </ol>
      <div class="section-label">Resources</div>
      <a class="resource-btn" href="#" onclick="return false;">
        <span class="resource-icon">📁</span> Open Resources Folder
      </a>
      <div class="note">
        Placeholder content. Action steps shown here are illustrative to demonstrate the format — real procedures come from your library. The Resources button maps to a hyperlink column pointing at the same resources folder structure used in the ATP.
      </div>`;
  }

  renderGallery();
  renderPanel();
</script>
</body>
</html>
