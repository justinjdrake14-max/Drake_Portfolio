<html lang="en">
<head>

═══════════════════════════════════════════════════════════════════
L.I.N.K. INTERACTIVE SYSTEM MAP. PRODUCTION.
Part of the L.I.N.K. portfolio site. Linked from index.html.
Claude Code: the graph is data-driven. NODES and EDGES live in the
script block. Positions are hand-set defaults; nodes are draggable
in-session (no persistence). Do not auto-layout, rewire, or reword
anything without an explicit instruction from Justin.
MEDIA: the MEDIA constant maps node numbers (per link-media-map.md)
to filenames living in assets/. To attach media, add entries like
  "21": ["21_1.png", "21_2.mp4"]
and nothing else. Panels render images and videos automatically and
show no media section for unlisted nodes.
Locked rules: no em dashes, numbers locked, no roadmap components
drawn. The visual gap between the main web and the ATP Checkpoints
web is deliberate; Vantage is the only bridge. Do not close it.
═══════════════════════════════════════════════════════════════════
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L.I.N.K. | Interactive System Map</title>
<link rel="icon" type="image/png" href="assets/link-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1e1e1e; --gold:#E8B10E; --text:#F2F2F2; --card:#221f1c;
  --text-dim:rgba(242,242,242,0.65); --text-faint:rgba(242,242,242,0.38);
  --line:rgba(242,242,242,0.12); --gold-dim:rgba(232,177,14,0.45);
  --display:'Barlow Condensed',sans-serif; --body:'IBM Plex Sans',sans-serif;
  --mono:'IBM Plex Mono',monospace;
  /* node class colors (map only; green/red stay reserved for figures) */
  --c-app:#E8B10E; --c-list:#9a948c; --c-flow:#8fb8d8; --c-bi:#c9a3e0; --c-ext:#e0906c;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--body);overflow:hidden}
a{color:var(--gold)}

.topbar{
  display:flex;align-items:center;gap:14px;padding:12px 20px;
  border-bottom:1px solid var(--line);background:var(--card);
  position:relative;z-index:30;flex-wrap:wrap;
}
.topbar img{width:38px;height:38px;border-radius:50%}
.topbar .t-title{font-family:var(--display);font-weight:700;font-size:1.25rem;letter-spacing:0.06em;text-transform:uppercase}
.topbar .t-sub{font-family:var(--mono);font-size:11px;color:var(--text-faint);letter-spacing:0.08em}
.topbar .spacer{flex:1}
.home-btn{
  font-family:var(--mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
  background:none;color:var(--gold);border:1px solid var(--gold-dim);border-radius:4px;
  padding:10px 18px;cursor:pointer;text-decoration:none;
}
.home-btn:hover{border-color:var(--gold)}
.reset-btn{
  font-family:var(--mono);font-size:12px;letter-spacing:0.08em;text-transform:uppercase;
  background:none;color:var(--text-dim);border:1px solid var(--line);border-radius:4px;
  padding:10px 18px;cursor:pointer;
}

/* ══════ CANVAS ══════ */
.viewport{position:relative;width:100vw;height:calc(100vh - 64px);overflow:auto;cursor:grab}
.viewport.dragging{cursor:grabbing}
.canvas{position:relative;width:1700px;height:1130px}
svg.edges{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.edge{stroke:rgba(242,242,242,0.14);stroke-width:1.5;fill:none;transition:stroke .2s}
.edge.lit{stroke:var(--gold);stroke-width:2.5}
.edge.dim{stroke:rgba(242,242,242,0.05)}

.node{
  position:absolute;transform:translate(-50%,-50%);
  background:var(--card);border:1.5px solid var(--line);border-radius:6px;
  padding:8px 12px;cursor:grab;text-align:center;
  min-width:104px;max-width:160px;transition:border-color .15s, box-shadow .15s, opacity .2s;
  z-index:5;
}
.node:hover{border-color:var(--gold);z-index:6}
.node.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(232,177,14,0.2);z-index:7}
.node.lit{border-color:var(--gold);box-shadow:0 0 14px rgba(232,177,14,0.25)}
.node.dim{opacity:0.25}
.node .n-type{
  font-family:var(--mono);font-size:8.5px;letter-spacing:0.1em;
  text-transform:uppercase;display:block;margin-bottom:3px;
}
.node .n-name{font-family:var(--display);font-weight:600;font-size:0.95rem;line-height:1.15;letter-spacing:0.02em}
.node .n-badge{
  font-family:var(--mono);font-size:8px;color:var(--text-faint);
  letter-spacing:0.08em;display:block;margin-top:3px;text-transform:uppercase;
}
.node.hub{min-width:170px;padding:14px 16px;border-width:2px;border-color:var(--gold-dim)}
.node.hub img{width:44px;height:44px;margin:0 auto 6px;border-radius:50%}
.node.hub .n-name{font-size:1.35rem}
.node.featured::after{
  content:"★";position:absolute;top:-8px;right:-8px;color:var(--gold);
  font-size:12px;background:var(--bg);border:1px solid var(--gold-dim);
  border-radius:50%;width:18px;height:18px;line-height:16px;
}
.t-app .n-type{color:var(--c-app)} .t-app{border-left:3px solid var(--c-app)}
.t-list .n-type{color:var(--c-list)} .t-list{border-left:3px solid var(--c-list)}
.t-flow .n-type{color:var(--c-flow)} .t-flow{border-left:3px solid var(--c-flow)}
.t-bi .n-type{color:var(--c-bi)} .t-bi{border-left:3px solid var(--c-bi)}
.t-ext .n-type{color:var(--c-ext)} .t-ext{border-left:3px dashed var(--c-ext);border-style:dashed}

.island-label{
  position:absolute;font-family:var(--mono);font-size:11px;color:var(--text-faint);
  letter-spacing:0.12em;text-transform:uppercase;pointer-events:none;
}
.node.key{
  border-color:var(--gold);border-width:2.5px;
  box-shadow:0 0 26px rgba(232,177,14,0.30);
  min-width:170px;padding:14px 18px;
}
.node.key .n-name{font-size:1.4rem}
.node.hub.key .n-name{font-size:1.55rem}
.node.key2{
  border-color:var(--gold-dim);border-width:2px;
  box-shadow:0 0 16px rgba(232,177,14,0.16);
  min-width:135px;padding:11px 14px;
}
.node.key2 .n-name{font-size:1.12rem}
.node .n-touch{
  font-family:var(--mono);font-size:8px;color:var(--gold);
  letter-spacing:0.08em;display:block;margin-top:4px;text-transform:uppercase;
}
.panel .p-touch{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.island-box{
  position:absolute;border:1px dashed rgba(224,144,108,0.35);border-radius:10px;
  pointer-events:none;
}

/* ══════ DETAIL PANEL ══════ */
.panel{
  position:fixed;top:64px;right:0;bottom:0;width:400px;max-width:92vw;
  background:var(--card);border-left:1px solid var(--line);
  transform:translateX(105%);transition:transform .25s ease;
  z-index:40;overflow-y:auto;padding:26px;
}
.panel.open{transform:none}
.panel .p-close{
  position:absolute;top:14px;right:16px;background:none;border:none;
  color:var(--text-dim);font-size:20px;cursor:pointer;line-height:1;
}
.panel .p-type{
  font-family:var(--mono);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;
  display:inline-block;padding:3px 9px;border:1px solid var(--line);border-radius:3px;
  margin-bottom:12px;
}
.panel h2{font-family:var(--display);font-weight:700;font-size:1.7rem;line-height:1.1;margin-bottom:4px}
.panel .p-feat{font-family:var(--mono);font-size:10px;color:var(--gold);letter-spacing:0.1em;text-transform:uppercase;margin-bottom:10px}
.panel .p-desc{color:var(--text-dim);font-size:0.95rem;line-height:1.65;margin:14px 0}
.p-media img,.p-media video{
  width:100%;border:1px solid var(--line);border-radius:6px;margin:14px 0;display:block;
}
.p-connects{margin-top:18px}
.p-connects .c-head{font-family:var(--mono);font-size:10px;letter-spacing:0.12em;color:var(--text-faint);text-transform:uppercase;margin-bottom:8px}
.p-connects button{
  display:block;width:100%;text-align:left;background:none;border:none;
  border-bottom:1px solid var(--line);color:var(--text-dim);
  font-family:var(--body);font-size:0.9rem;padding:9px 2px;cursor:pointer;
}
.p-connects button:hover{color:var(--gold)}

</style>
</head>

  ["sterile","f_vantage"],["f_vantage","ext_vantage"]
];

/* ═══════ RENDER ═══════ */
const canvas = document.getElementById('canvas');
const edgeLayer = document.getElementById('edgeLayer');
const byId = {};
NODES.forEach(n => byId[n.id] = n);

const edgeEls = [];
EDGES.forEach(([a,b]) => {
  const A = byId[a], B = byId[b];
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',A.x); line.setAttribute('y1',A.y);
  line.setAttribute('x2',B.x); line.setAttribute('y2',B.y);
  line.setAttribute('class','edge'); line.dataset.a=a; line.dataset.b=b;
  edgeLayer.appendChild(line); edgeEls.push(line);
});

function refreshEdges(id){
  edgeEls.forEach(line=>{
    if(line.dataset.a===id){ line.setAttribute('x1',byId[id].x); line.setAttribute('y1',byId[id].y); }
    if(line.dataset.b===id){ line.setAttribute('x2',byId[id].x); line.setAttribute('y2',byId[id].y); }
  });
}

NODES.forEach(n => {
  const el = document.createElement('div');
  el.className = 'node ' + TYPE_META[n.type].cls + (n.hub?' hub':'') + (n.featured?' featured':'') + (n.key?' key':'') + (n.key2?' key2':'');
  el.style.left = n.x+'px'; el.style.top = n.y+'px';
  el.dataset.id = n.id;
  el.tabIndex = 0;
  el.innerHTML =
    (n.hub ? '<img src="'+document.querySelector('.topbar img').src+'" alt="">' : '') +
    '<span class="n-type">'+TYPE_META[n.type].label+'</span>' +
    '<span class="n-name">'+n.name+'</span>' +
    (n.badge ? '<span class="n-badge">'+n.badge+'</span>' : '') +
    (n.touch ? '<span class="n-touch">◈ user touchpoint</span>' : '');
  el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();openPanel(n.id);} });
  canvas.appendChild(el);
});

/* ═══════ MEDIA (per link-media-map.md; files live in assets/) ═══════ */
const MEDIA = {
  /* node number: ["FILES", ...]  e.g.  "21": ["21_1.png", "21_2.mp4"] */
};
const NODE_NUM = {
  1:"link", 2:"ext_vantage", 3:"bi_insights", 4:"checkpoints", 5:"admin",
  6:"bi_monitor", 7:"bi_alpha", 8:"bi_tracker",
  9:"reg_list", 10:"master", 11:"audit", 12:"archive", 13:"docs",
  14:"smartcard", 15:"suggest", 16:"trainreq",
  17:"f_reguser", 18:"f_dodid", 19:"f_enroll", 20:"f_recreg", 21:"f_registry", 22:"f_access",
  23:"f_verify", 24:"f_welcome", 25:"f_ticket", 26:"f_complete", 27:"f_sweep",
  28:"f_cp", 29:"f_cp56", 30:"f_remind", 31:"f_reporter", 32:"sterile", 33:"f_vantage"
};
const NUM_BY_ID = {};
Object.keys(NODE_NUM).forEach(k => NUM_BY_ID[NODE_NUM[k]] = k);
function renderMedia(id){
  const box = document.getElementById('pMedia');
  box.innerHTML = '';
  const files = MEDIA[NUM_BY_ID[id]] || [];
  files.forEach(f => {
    let el;
    if(/\.(mp4|webm|mov)$/i.test(f)){
      el = document.createElement('video');
      el.controls = true; el.preload = 'metadata'; el.playsInline = true;
      el.src = 'assets/' + f;
    } else {
      el = document.createElement('img');
      el.src = 'assets/' + f; el.alt = '';
      el.loading = 'lazy';
    }
    box.appendChild(el);
  });
}

/* ═══════ PANEL ═══════ */
const panel = document.getElementById('panel');
function openPanel(id){
  const n = byId[id];
  document.querySelectorAll('.node.sel').forEach(e=>e.classList.remove('sel'));
  document.querySelector('.node[data-id="'+id+'"]').classList.add('sel');
  document.getElementById('pType').textContent = TYPE_META[n.type].label + (n.badge? ' · '+n.badge : '');
  document.getElementById('pFeat').style.display = n.featured ? 'block':'none';
  document.getElementById('pTouch').style.display = n.touch ? 'block':'none';
  document.getElementById('pName').innerHTML = n.name;
  document.getElementById('pDesc').textContent = n.desc;
  renderMedia(id);
  const conn = document.getElementById('pConnects'); conn.innerHTML='';
  EDGES.filter(e=>e[0]===id||e[1]===id).forEach(e=>{
    const other = byId[e[0]===id?e[1]:e[0]];
    const b = document.createElement('button');
    b.textContent = other.name.replace(/&amp;/g,'&');
    b.addEventListener('click',()=>openPanel(other.id));
    conn.appendChild(b);
  });
  highlight(id);
  panel.classList.add('open');
}
document.getElementById('panelClose').addEventListener('click',()=>{panel.classList.remove('open');clearFx();});

/* ═══════ HIGHLIGHT ═══════ */
function clearFx(){
  document.querySelectorAll('.node').forEach(e=>e.classList.remove('lit','dim','sel'));
  document.querySelectorAll('.edge').forEach(e=>e.classList.remove('lit','dim'));
}
function highlight(id){
  const neighbors = new Set([id]);
  EDGES.forEach(e=>{ if(e[0]===id)neighbors.add(e[1]); if(e[1]===id)neighbors.add(e[0]); });
  document.querySelectorAll('.node').forEach(el=>{
    el.classList.toggle('dim', !neighbors.has(el.dataset.id));
    el.classList.remove('lit');
  });
  document.querySelectorAll('.edge').forEach(el=>{
    const on = el.dataset.a===id || el.dataset.b===id;
    el.classList.toggle('lit',on); el.classList.toggle('dim',!on);
  });
}
document.getElementById('resetBtn').addEventListener('click',()=>{clearFx();panel.classList.remove('open');});

/* ═══════ NODE DRAG (in-session only; refresh resets to defaults) ═══════ */
let nodeDrag = null;
canvas.addEventListener('mousedown', e => {
  const el = e.target.closest('.node');
  if(!el) return;
  const n = byId[el.dataset.id];
  nodeDrag = {n, el, sx:e.clientX, sy:e.clientY, ox:n.x, oy:n.y, moved:false};
  e.preventDefault();
});
window.addEventListener('mousemove', e => {
  if(!nodeDrag) return;
  const dx = e.clientX - nodeDrag.sx, dy = e.clientY - nodeDrag.sy;
  if(Math.abs(dx)>4 || Math.abs(dy)>4) nodeDrag.moved = true;
  if(!nodeDrag.moved) return;
  nodeDrag.n.x = nodeDrag.ox + dx; nodeDrag.n.y = nodeDrag.oy + dy;
  nodeDrag.el.style.left = nodeDrag.n.x+'px'; nodeDrag.el.style.top = nodeDrag.n.y+'px';
  refreshEdges(nodeDrag.n.id);
});
window.addEventListener('mouseup', () => {
  if(!nodeDrag) return;
  if(!nodeDrag.moved) openPanel(nodeDrag.n.id);
  nodeDrag = null;
});

/* ═══════ DRAG TO PAN ═══════ */
const vp = document.getElementById('viewport');
let drag=null;
vp.addEventListener('mousedown',e=>{
  if(e.target.closest('.node'))return;
  drag={x:e.clientX,y:e.clientY,l:vp.scrollLeft,t:vp.scrollTop};
  vp.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  vp.scrollLeft=drag.l-(e.clientX-drag.x);
  vp.scrollTop=drag.t-(e.clientY-drag.y);
});
window.addEventListener('mouseup',()=>{drag=null;vp.classList.remove('dragging');});

/* start centered on the hub */
vp.scrollLeft = 640 - vp.clientWidth/2 + 100;
vp.scrollTop = 470 - vp.clientHeight/2;
</script>
</body>
</html>
