<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C-STAR v2 — L.I.N.K. Mockup</title>
<style>
  :root{
    --charcoal:#333333;--charcoal-2:#2a2a2a;--charcoal-3:#3d3d3d;
    --gold:#FFCD00;--offwhite:#F2F2F2;--muted:#9a9a9a;--line:#474747;
    --green:#6fbf73;--red:#e06c6c;
    --cell:#2f2f2f;--weekend:#222;--dayoff:#3a2626;--training:#4a3d12;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',-apple-system,Tahoma,sans-serif;background:#1e1e1e;
    color:var(--offwhite);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

  .header{background:var(--charcoal);border-bottom:2px solid var(--gold);height:64px;
    display:flex;align-items:center;padding:0 22px;flex-shrink:0;}
  .brand{display:flex;align-items:center;gap:14px;}
  .brand-mark{width:38px;height:38px;border:2px solid var(--gold);border-radius:6px;
    display:flex;align-items:center;justify-content:center;color:var(--gold);font-weight:800;font-size:14px;}
  .brand-title{color:var(--gold);font-size:20px;font-weight:700;letter-spacing:2px;}
  .brand-sub{color:var(--muted);font-size:11px;letter-spacing:1px;margin-top:1px;}
  .role-chip{margin-left:auto;background:var(--charcoal-3);border:1px solid var(--line);
    border-radius:18px;padding:7px 16px;font-size:13px;}
  .role-chip b{color:var(--gold);font-weight:600;}

  .body{flex:1;display:flex;min-height:0;}
  .rail{width:300px;min-width:280px;background:var(--charcoal-2);border-right:1px solid var(--line);
    padding:22px 0;flex-shrink:0;}
  .rail-h{color:var(--muted);font-size:11px;letter-spacing:2px;padding:0 22px 14px;text-transform:uppercase;}
  .step-nav{padding:15px 22px;display:flex;gap:14px;align-items:flex-start;cursor:pointer;border-left:3px solid transparent;}
  .step-nav:hover{background:var(--charcoal-3);}
  .step-nav.active{background:var(--charcoal-3);border-left:3px solid var(--gold);}
  .step-dot{width:30px;height:30px;flex-shrink:0;border-radius:50%;border:2px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--muted);}
  .step-nav.active .step-dot{border-color:var(--gold);color:var(--gold);}
  .step-nav.done .step-dot{background:var(--gold);border-color:var(--gold);color:var(--charcoal);}
  .step-info{padding-top:3px;}
  .step-info .t{font-size:14px;font-weight:600;}
  .step-nav.active .step-info .t{color:var(--gold);}
  .step-info .d{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3;}

  .panel{flex:1;background:var(--charcoal);overflow-y:auto;padding:28px 38px 90px;position:relative;}
  .panel::-webkit-scrollbar{width:9px;}.panel::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
  .rail::-webkit-scrollbar{width:0;}
  .p-title{color:var(--gold);font-size:25px;font-weight:700;}
  .p-desc{color:var(--muted);font-size:14px;margin:8px 0 22px;line-height:1.5;max-width:820px;}
  .section-label{color:var(--gold);font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
    margin:26px 0 14px;display:flex;align-items:center;gap:10px;}
  .section-label::after{content:"";flex:1;height:1px;background:var(--line);}

  /* step1 funnel */
  .src-toggle{display:inline-flex;background:var(--charcoal-2);border:1px solid var(--line);border-radius:8px;padding:4px;gap:4px;margin-bottom:8px;}
  .src-btn{padding:8px 18px;border-radius:6px;font-size:13px;color:var(--muted);cursor:pointer;border:none;background:none;}
  .src-btn.on{background:var(--gold);color:var(--charcoal);font-weight:700;}
  .src-hint{font-size:12px;color:var(--muted);margin-bottom:18px;}
  .funnel{border:1px solid var(--line);border-radius:8px;overflow:hidden;max-width:820px;}
  .frow{display:grid;grid-template-columns:1.6fr 0.8fr 1fr 0.9fr 0.9fr;align-items:center;padding:13px 18px;border-bottom:1px solid var(--line);font-size:14px;}
  .frow:last-child{border-bottom:none;}
  .frow.head{background:var(--charcoal-2);color:var(--muted);font-size:11px;letter-spacing:1px;text-transform:uppercase;}
  .frow .stage{font-weight:600;}
  .num-in{width:90px;background:var(--charcoal-2);border:1px solid var(--line);border-radius:5px;padding:6px 8px;color:var(--offwhite);font-size:14px;}
  .num-in:focus{outline:none;border-color:var(--gold);}
  .flag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;padding:3px 10px;border-radius:12px;}
  .flag.ok{color:var(--green);background:rgba(111,191,115,0.12);}
  .flag.low{color:var(--red);background:rgba(224,108,108,0.12);}
  .conv{font-weight:700;}.conv.low{color:var(--red);}.conv.ok{color:var(--green);}

  /* step2 rca */
  .rca-card{border:1px solid var(--line);border-left:3px solid var(--red);border-radius:8px;padding:18px 20px;margin-bottom:18px;max-width:820px;background:var(--charcoal-2);}
  .rca-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
  .rca-stage{font-size:17px;font-weight:700;}
  .rca-gap{font-size:12px;color:var(--red);font-weight:600;}
  .rca-guide{font-size:12px;color:var(--muted);margin-bottom:14px;font-style:italic;}
  .cause{display:flex;gap:11px;padding:9px 0;align-items:flex-start;border-top:1px solid rgba(255,255,255,0.05);}
  .cause input{margin-top:3px;accent-color:var(--gold);width:16px;height:16px;flex-shrink:0;}
  .cause-body{flex:1;}.cause-label{font-size:14px;cursor:pointer;}
  .remark{display:none;margin-top:9px;}.remark.show{display:block;}
  .remark textarea{width:100%;background:var(--charcoal);border:1px solid var(--line);border-radius:6px;padding:9px 11px;color:var(--offwhite);font-size:13px;font-family:inherit;resize:vertical;min-height:54px;}
  .remark textarea:focus{outline:none;border-color:var(--gold);}
  .remark .req{font-size:11px;color:var(--gold);margin-bottom:5px;letter-spacing:0.5px;}

  /* step3 recs */
  .rec{display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:8px;padding:14px 18px;margin-bottom:11px;max-width:820px;background:var(--charcoal-2);}
  .rec-icon{width:34px;height:34px;border-radius:7px;background:var(--charcoal);border:1px solid var(--gold);color:var(--gold);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
  .rec-body{flex:1;}.rec-name{font-size:15px;font-weight:600;}.rec-src{font-size:11px;color:var(--muted);margin-top:2px;}
  .rec-x{color:var(--muted);cursor:pointer;font-size:18px;padding:4px 8px;}.rec-x:hover{color:var(--red);}

  /* step4 roster */
  .roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px;max-width:1000px;}
  .rcard{border:1px solid var(--line);border-radius:8px;padding:14px 16px;background:var(--charcoal-2);}
  .rcard .rn{font-size:15px;font-weight:600;}
  .rcard .rc{font-size:12px;color:var(--muted);margin-top:3px;}
  .rcard .rc b{color:var(--green);}
  .weak-tag{margin-top:9px;font-size:12px;background:rgba(224,108,108,0.12);color:var(--red);border-radius:5px;padding:5px 9px;display:inline-block;}
  .weak-tag b{color:var(--offwhite);font-weight:600;}

  /* step4 builder */
  .builder{border:1px solid var(--line);border-radius:8px;padding:18px;background:var(--charcoal-2);max-width:1000px;margin-bottom:8px;}
  .chip-row{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px;}
  .chip{border:1px solid var(--line);border-radius:18px;padding:8px 15px;font-size:13px;cursor:pointer;background:var(--charcoal);}
  .chip:hover{border-color:var(--gold);}
  .chip.armed{background:var(--gold);color:var(--charcoal);font-weight:700;border-color:var(--gold);}
  .chip.done{opacity:0.4;text-decoration:line-through;cursor:default;}
  .builder-sub{font-size:12px;color:var(--muted);margin:14px 0 8px;letter-spacing:0.5px;}
  .rcheck{display:inline-flex;align-items:center;gap:7px;font-size:13px;border:1px solid var(--line);border-radius:6px;padding:7px 12px;cursor:pointer;background:var(--charcoal);}
  .rcheck input{accent-color:var(--gold);}
  .place-banner{margin-top:14px;background:rgba(255,205,0,0.1);border:1px solid var(--gold);border-radius:7px;padding:11px 15px;font-size:13px;color:var(--gold);display:flex;justify-content:space-between;align-items:center;}
  .place-banner .cx{cursor:pointer;color:var(--muted);font-size:13px;}
  .place-banner .cx:hover{color:var(--red);}

  /* calendar */
  .legend{display:flex;gap:18px;flex-wrap:wrap;margin-bottom:12px;font-size:12px;color:var(--muted);}
  .legend span{display:inline-flex;align-items:center;gap:7px;}
  .swatch{width:14px;height:14px;border-radius:3px;border:1px solid var(--line);display:inline-block;}
  .cal{max-width:1000px;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .cal-dow{display:grid;grid-template-columns:38px repeat(7,1fr);background:var(--charcoal-2);}
  .cal-dow div{padding:8px 4px;text-align:center;font-size:10px;letter-spacing:1px;color:var(--muted);text-transform:uppercase;}
  .cal-week{display:grid;grid-template-columns:38px repeat(7,1fr);border-top:1px solid var(--line);}
  .wk-num{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);background:var(--charcoal-2);}
  .cell{min-height:62px;border-left:1px solid var(--line);background:var(--cell);padding:5px 6px;cursor:default;position:relative;}
  .cell.wknd{background:var(--weekend);}
  .cell.off{background:var(--dayoff);}
  .cell.trn{background:var(--training);border-left:1px solid var(--gold);}
  .cell.placeable{cursor:pointer;}
  .cell.placeable:hover{outline:2px solid var(--gold);outline-offset:-2px;}
  .cell .dnum{font-size:11px;color:var(--muted);}
  .cell.trn .dnum{color:var(--gold);}
  .cell .offlbl{font-size:9px;color:var(--red);margin-top:3px;line-height:1.2;}
  .cell .tlbl{font-size:10px;color:var(--offwhite);margin-top:2px;line-height:1.25;font-weight:600;}
  .cell .twho{font-size:9px;color:var(--gold);margin-top:1px;}
  .cell .trm{position:absolute;top:2px;right:4px;font-size:11px;color:var(--muted);cursor:pointer;}
  .cell .trm:hover{color:var(--red);}

  /* step5 summary */
  .sum-block{border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:16px;max-width:900px;background:var(--charcoal-2);}
  .sum-h{color:var(--gold);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;}
  .sum-line{font-size:14px;padding:6px 0;border-top:1px solid rgba(255,255,255,0.05);line-height:1.4;}
  .sum-line:first-of-type{border-top:none;}
  .sum-line b{color:var(--gold);font-weight:600;}
  .dispatch{display:flex;gap:12px;flex-wrap:wrap;margin-top:6px;}
  .disp{flex:1;min-width:200px;border:1px solid var(--line);border-radius:8px;padding:14px 16px;background:var(--charcoal-2);}
  .disp .dh{font-size:13px;font-weight:700;color:var(--offwhite);display:flex;align-items:center;gap:8px;}
  .disp .dd{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.4;}
  .disp .dh .dot{width:8px;height:8px;border-radius:50%;background:var(--gold);}

  .footer{position:absolute;bottom:0;left:0;right:0;background:var(--charcoal-2);border-top:1px solid var(--line);padding:14px 38px;display:flex;justify-content:space-between;align-items:center;}
  .btn{padding:11px 26px;border-radius:7px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--line);background:var(--charcoal-3);color:var(--offwhite);}
  .btn:hover{border-color:var(--gold);}
  .btn.primary{background:var(--gold);color:var(--charcoal);border-color:var(--gold);}
  .btn.primary:hover{opacity:0.9;}
  .btn.ghost{background:none;}
  .empty{color:var(--muted);font-size:14px;padding:20px 0;font-style:italic;}
  .note{margin-top:24px;padding:13px 16px;background:rgba(255,205,0,0.06);border-left:3px solid var(--gold);border-radius:4px;font-size:12px;color:var(--muted);line-height:1.5;max-width:900px;}
</style>
</head>
<body>
  <div class="header">
    <div class="brand">
      <div class="brand-mark">LNK</div>
      <div>
        <div class="brand-title">C&#8209;STAR</div>
        <div class="brand-sub">COMPANY &amp; STATION TRAINING ASSESSMENT REVIEW &nbsp;|&nbsp; Q3 FY26</div>
      </div>
    </div>
    <div class="role-chip">Station Commander &nbsp;|&nbsp; <b>Hopkinsville Station</b></div>
  </div>

  <div class="body">
    <div class="rail"><div class="rail-h">Assessment Steps</div><div id="stepper"></div></div>
    <div class="panel" id="panel"></div>
  </div>

<script>
/* ---------- DATA ---------- */
const stages = [
  {k:"attempts", name:"Attempts",   count:520},
  {k:"contacts", name:"Contacts",   count:182, bench:35},
  {k:"am",       name:"Appt. Made", count:71,  bench:40},
  {k:"ac",       name:"Appt. Conducted", count:57, bench:80},
  {k:"test",     name:"Test",       count:43,  bench:75},
  {k:"pass",     name:"Test Pass",  count:30,  bench:80},
  {k:"floor",    name:"Floor",      count:28,  bench:90},
  {k:"contract", name:"Contract",   count:20,  bench:80},
];
const rootCauses = {
  am:{label:"Contacts → Appt. Made", causes:[
    {id:"am1",text:"Weak appointment ask — no assumptive close",rec:"Appointment-Setting Phone Drill"},
    {id:"am2",text:"No clear value proposition offered",rec:"Value Proposition Workshop"},
    {id:"am3",text:"Poor objection handling on the phone",rec:"Phone Objection Handling Rehearsal"},
    {id:"am4",text:"Not asking for a specific date and time",rec:"Assumptive Close Practice"}]},
  pass:{label:"Test → Test Pass", causes:[
    {id:"p1",text:"Insufficient ASVAB study prep before test",rec:"ASVAB Study Plan Build"},
    {id:"p2",text:"No practice tests administered",rec:"Practice Test Administration"},
    {id:"p3",text:"Applicant tested before ready",rec:"Test Readiness Screening"},
    {id:"p4",text:"Available test-prep resources not used",rec:"Test-Prep Resource Walkthrough"}]},
  contract:{label:"Floor → Contract", causes:[
    {id:"c1",text:"No firm job match presented",rec:"Job Match Counseling Drill"},
    {id:"c2",text:"Weak close at the table",rec:"Floor Close Rehearsal"},
    {id:"c3",text:"Incentive or ship-date mismatch",rec:"Incentive Brief Review"},
    {id:"c4",text:"Applicant objections not resolved",rec:"Objection Resolution at the Table"}]},
};
const recruiters = [
  {name:"SSG Reyes", contracts:7, weak:"Test → Pass", weakPct:71},
  {name:"SGT Tran",  contracts:3, weak:"Floor → Contract", weakPct:58},
  {name:"SSG Okafor",contracts:5, weak:"Contacts → Appt Made", weakPct:33},
  {name:"SGT Bell",  contracts:2, weak:"Floor → Contract", weakPct:61},
  {name:"SSG Diaz",  contracts:6, weak:"Test → Pass", weakPct:69},
];
function initials(n){const p=n.split(" ");return (p[1]||n).slice(0,4);}

/* 13-week window starts Mon 06 Jul 2026 */
const START={y:2026,m:6,d:6}; // month 0-indexed (6=July)
const blackouts={
  "2026-08-14":"Bde Training Holiday",
  "2026-09-04":"DONSA",
  "2026-09-07":"Labor Day",
};
function cellDate(i){return new Date(START.y,START.m,START.d+i);}
function iso(dt){return dt.getFullYear()+"-"+String(dt.getMonth()+1).padStart(2,"0")+"-"+String(dt.getDate()).padStart(2,"0");}

const team=recruiters.map(r=>r.name);

/* ---------- STATE ---------- */
let state={step:1,source:"vantage",picks:{},removed:{},
  placing:{rec:null,recruiters:[]}, schedule:[] /* {rec,recruiters,date} */ };

function conv(i){return stages[i-1]?(stages[i].count/stages[i-1].count*100):0;}
function weakStages(){return stages.map((s,i)=>({s,i})).filter(o=>o.i>0&&conv(o.i)<o.s.bench&&rootCauses[o.s.k]).map(o=>o.s.k);}
function chosenRecs(){const r=[];Object.values(state.picks).forEach(p=>{if(p.checked&&!state.removed[p.rec])r.push(p);});const seen={};return r.filter(x=>seen[x.rec]?false:(seen[x.rec]=true));}
function scheduledNames(){return state.schedule.map(s=>s.rec);}
function unscheduled(){const sn=scheduledNames();return chosenRecs().filter(r=>!sn.includes(r.rec));}

/* ---------- STEPPER ---------- */
const steps=[
  {n:1,t:"Production Data",d:"Pull funnel from Vantage or enter manually"},
  {n:2,t:"Root Cause Analysis",d:"Diagnose below-benchmark stages"},
  {n:3,t:"Training Plan",d:"Review auto-generated recommendations"},
  {n:4,t:"Assign & Schedule",d:"Pair recruiters, place on the 13-week calendar"},
  {n:5,t:"Review & Submit",d:"One click — report up, tasks out"},
];
function renderStepper(){document.getElementById('stepper').innerHTML=steps.map(s=>`
  <div class="step-nav ${s.n===state.step?'active':''} ${s.n<state.step?'done':''}" onclick="goto(${s.n})">
    <div class="step-dot">${s.n<state.step?'✓':s.n}</div>
    <div class="step-info"><div class="t">${s.t}</div><div class="d">${s.d}</div></div></div>`).join('');}
function goto(n){state.step=n;render();}
function next(){if(state.step<5){state.step++;render();}}
function back(){if(state.step>1){state.step--;render();}}

/* ---------- STEPS 1-3 ---------- */
function step1(){
  const rows=stages.map((s,i)=>{
    if(i===0){const v=state.source==='manual'?`<input class="num-in" value="${s.count}" onchange="setCount(0,this.value)">`:`<b>${s.count}</b>`;
      return `<div class="frow"><div class="stage">${s.name}</div><div>${v}</div><div>—</div><div>—</div><div>—</div></div>`;}
    const c=conv(i),low=c<s.bench;
    const v=state.source==='manual'?`<input class="num-in" value="${s.count}" onchange="setCount(${i},this.value)">`:`<b>${s.count}</b>`;
    return `<div class="frow"><div class="stage">${s.name}</div><div>${v}</div>
      <div class="conv ${low?'low':'ok'}">${c.toFixed(1)}%</div><div>${s.bench}%</div>
      <div><span class="flag ${low?'low':'ok'}">${low?'● Below':'● On Track'}</span></div></div>`;}).join('');
  return `<div class="p-title">Production Data</div>
    <div class="p-desc">Quarterly funnel, attempts through contracts. Conversion is each stage against the one above it, measured against benchmark.</div>
    <div class="src-toggle"><button class="src-btn ${state.source==='vantage'?'on':''}" onclick="setSource('vantage')">Vantage (Auto)</button>
    <button class="src-btn ${state.source==='manual'?'on':''}" onclick="setSource('manual')">Manual Entry</button></div>
    <div class="src-hint">${state.source==='vantage'?'Pulled automatically from Vantage. Switch to Manual until AIE stands up the connector.':'Manual entry active. Conversions and flags recalculate as you type.'}</div>
    <div class="funnel"><div class="frow head"><div>Stage</div><div>Count</div><div>Conversion</div><div>Benchmark</div><div>Status</div></div>${rows}</div>
    <div class="note">Benchmarks and counts are placeholder. The structure — conversion vs. benchmark with a status flag — is the real layout.</div>`;
}
function step2(){
  const weak=weakStages();
  if(!weak.length)return `<div class="p-title">Root Cause Analysis</div><div class="empty">No below-benchmark stages.</div>`;
  const cards=weak.map(k=>{const rc=rootCauses[k];const idx=stages.findIndex(s=>s.k===k);const gap=(stages[idx].bench-conv(idx)).toFixed(1);
    const causes=rc.causes.map(c=>{const p=state.picks[c.id];const ch=p&&p.checked;
      return `<div class="cause"><input type="checkbox" id="${c.id}" ${ch?'checked':''} onchange="togglePick('${c.id}','${k}','${c.rec.replace(/'/g,"")}')">
      <div class="cause-body"><label class="cause-label" for="${c.id}">${c.text}</label>
      <div class="remark ${ch?'show':''}" id="rem-${c.id}"><div class="req">★ Required remark — what does this look like on the ground?</div>
      <textarea placeholder="Document the specific context behind this cause..." onchange="setRemark('${c.id}',this.value)">${p?p.remark:''}</textarea></div></div></div>`;}).join('');
    return `<div class="rca-card"><div class="rca-head"><div class="rca-stage">${rc.label}</div><div class="rca-gap">${gap} pts below benchmark</div></div>
    <div class="rca-guide">Troubleshooting guide: if this conversion is low, it is usually one or more of the following. Select all that apply.</div>${causes}</div>`;}).join('');
  return `<div class="p-title">Root Cause Analysis</div>
    <div class="p-desc">Only below-benchmark stages surface here. Pick every cause that applies. Each pick forces a remark — that is the record your company commander reads.</div>${cards}`;
}
function step3(){
  const recs=chosenRecs();
  if(!recs.length)return `<div class="p-title">Recommended Training Plan</div><div class="empty">No root causes selected yet. Go back to Step 2.</div>`;
  const list=recs.map(r=>`<div class="rec"><div class="rec-icon">▲</div>
    <div class="rec-body"><div class="rec-name">${r.rec}</div><div class="rec-src">From Task Library · triggered by ${rootCauses[r.stageKey].label}</div></div>
    <div class="rec-x" onclick="removeRec('${r.rec.replace(/'/g,"")}')" title="Remove">✕</div></div>`).join('');
  return `<div class="p-title">Recommended Training Plan</div>
    <div class="p-desc">Auto-generated from your root causes, drawn from the same Task Library that feeds the How To Hub. Remove what does not fit. Next step pairs trainers and schedules each.</div>${list}`;
}

/* ---------- STEP 4 ---------- */
function step4(){
  const recs=chosenRecs();
  // roster
  const roster=recruiters.map(r=>`<div class="rcard"><div class="rn">${r.name}</div>
    <div class="rc">Contracts QTD: <b>${r.contracts}</b></div>
    <div class="weak-tag">Weakest: <b>${r.weak}</b> · ${r.weakPct}%</div></div>`).join('');
  // builder
  let builder;
  if(!recs.length){builder=`<div class="empty">No approved training to schedule.</div>`;}
  else{
    const un=unscheduled();
    const chips=recs.map(r=>{const done=scheduledNames().includes(r.rec);const armed=state.placing.rec===r.rec;
      return `<div class="chip ${armed?'armed':''} ${done?'done':''}" ${done?'':`onclick="arm('${r.rec.replace(/'/g,"")}')"`}>${r.rec}</div>`;}).join('');
    let recruiterPick='';
    if(state.placing.rec){
      const checks=recruiters.map(r=>`<label class="rcheck"><input type="checkbox" ${state.placing.recruiters.includes(r.name)?'checked':''} onchange="toggleRecruiter('${r.name}')"> ${r.name}</label>`).join('');
      recruiterPick=`<div class="builder-sub">WHO DELIVERS IT — pick one or pair two</div><div class="chip-row">${checks}</div>
        <div class="place-banner"><div>Placing <b>${state.placing.rec}</b>${state.placing.recruiters.length?' — '+state.placing.recruiters.join(' + '):' — select recruiter(s)'}. Click an open weekday on the calendar.</div><div class="cx" onclick="cancelPlace()">Cancel</div></div>`;
    }
    builder=`<div class="builder">
      <div class="builder-sub">WHAT TO DELIVER — ${un.length} unscheduled (priority order)</div>
      <div class="chip-row">${chips}</div>${recruiterPick}</div>`;
  }
  return `<div class="p-title">Assign &amp; Schedule</div>
    <div class="p-desc">Pair recruiters to training using their live production, then place each on the 13-week calendar. Dates set here — weekends and days off are blocked. Planner gets everything on submit; you never have to open it.</div>
    <div class="section-label">Recruiter Production</div>
    <div class="roster">${roster}</div>
    <div class="note" style="margin-top:14px">Pair a strong performer with someone weak in the same stage to make the assignment a development move, not just labor. Example: SSG Reyes (7 contracts) running Floor → Contract training for SGT Tran (weakest there at 58%).</div>
    <div class="section-label">Build the Schedule</div>${builder}
    <div class="section-label">13-Week Calendar — Q3 FY26</div>
    ${calendarLegend()}${calendarGrid()}`;
}
function calendarLegend(){
  return `<div class="legend">
    <span><span class="swatch" style="background:var(--cell)"></span>Available</span>
    <span><span class="swatch" style="background:var(--weekend)"></span>Weekend</span>
    <span><span class="swatch" style="background:var(--dayoff);border-color:#5a3a3a"></span>Day Off / Holiday</span>
    <span><span class="swatch" style="background:var(--training);border-color:var(--gold)"></span>Training Scheduled</span></div>`;
}
function calendarGrid(){
  let html=`<div class="cal"><div class="cal-dow"><div></div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>`;
  for(let w=0;w<13;w++){
    html+=`<div class="cal-week"><div class="wk-num">W${w+1}</div>`;
    for(let d=0;d<7;d++){
      const idx=w*7+d;const dt=cellDate(idx);const key=iso(dt);
      const dow=dt.getDay(); // 0 Sun ... 6 Sat
      const isWknd=(dow===0||dow===6);
      const off=blackouts[key];
      const sched=state.schedule.find(s=>s.date===key);
      let cls="cell",inner=`<div class="dnum">${dt.getMonth()+1}/${dt.getDate()}</div>`;
      if(sched){cls+=" trn";
        inner+=`<div class="trm" onclick="unschedule('${key}')">✕</div><div class="tlbl">${shorten(sched.rec)}</div><div class="twho">${sched.recruiters.map(initials).join(' + ')}</div>`;
      }else if(off){cls+=" off";inner+=`<div class="offlbl">${off}</div>`;
      }else if(isWknd){cls+=" wknd";
      }else{ // available weekday
        if(state.placing.rec&&state.placing.recruiters.length){cls+=" placeable";inner=`<div class="dnum">${dt.getMonth()+1}/${dt.getDate()}</div>`+inner.replace(/<div class="dnum">.*?<\/div>/,'');}
      }
      const click=(!sched&&!off&&!isWknd&&state.placing.rec&&state.placing.recruiters.length)?`onclick="placeOn('${key}')"`:'';
      html+=`<div class="${cls}" ${click}>${inner}</div>`;
    }
    html+=`</div>`;
  }
  return html+`</div>`;
}
function shorten(n){return n.length>22?n.slice(0,20)+'…':n;}

/* ---------- STEP 5 ---------- */
function step5(){
  const sched=[...state.schedule].sort((a,b)=>a.date<b.date?-1:1);
  const funnelLines=stages.map((s,i)=>i===0?'':`<div class="sum-line">${s.name}: <b>${conv(i).toFixed(1)}%</b> vs ${s.bench}% ${conv(i)<s.bench?'— below':'— on track'}</div>`).join('');
  const rcaLines=Object.values(state.picks).filter(p=>p.checked).map(p=>{const c=rootCauses[p.stageKey].causes.find(x=>x.rec===p.rec);
    return `<div class="sum-line">${rootCauses[p.stageKey].label} — ${c?c.text:''}<br><span style="color:var(--muted)">“${p.remark||'(no remark)'}”</span></div>`;}).join('')||`<div class="sum-line" style="color:var(--muted)">No root causes selected.</div>`;
  const planLines=sched.map(s=>{const dt=new Date(s.date+"T00:00:00");
    return `<div class="sum-line"><b>${s.rec}</b> — ${s.recruiters.join(' + ')} · ${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>`;}).join('')||`<div class="sum-line" style="color:var(--muted)">Nothing scheduled.</div>`;
  const unsched=unscheduled().length;
  return `<div class="p-title">Review &amp; Submit</div>
    <div class="p-desc">This is the plan of record at submit. One click writes the C-STAR to SharePoint, creates the Planner tasks for each recruiter, and sends the report to your company command team.</div>
    <div class="sum-block"><div class="sum-h">Funnel Snapshot</div>${funnelLines}</div>
    <div class="sum-block"><div class="sum-h">Root Causes &amp; Remarks</div>${rcaLines}</div>
    <div class="sum-block"><div class="sum-h">13-Week Training Plan${unsched?` &nbsp;<span style="color:var(--red);font-weight:600">(${unsched} still unscheduled)</span>`:''}</div>${planLines}</div>
    <div class="section-label">One Click Does All Three</div>
    <div class="dispatch">
      <div class="disp"><div class="dh"><span class="dot"></span>SharePoint</div><div class="dd">C-STAR record written as system of record. The library and SeeStar read from it.</div></div>
      <div class="disp"><div class="dh"><span class="dot"></span>Planner</div><div class="dd">A task per training lands in the shared station Planner with assignee and due date. Each recruiter sees it in their own task bar. Drag-and-drop is there if wanted, required of no one.</div></div>
      <div class="disp"><div class="dh"><span class="dot"></span>Command Team</div><div class="dd">Finalized plan — subjects and dates — routed to higher. No second trip.</div></div>
    </div>`;
}

/* ---------- ACTIONS ---------- */
function setSource(s){state.source=s;render();}
function setCount(i,v){stages[i].count=parseInt(v)||0;render();}
function togglePick(id,k,rec){if(!state.picks[id])state.picks[id]={checked:false,remark:'',rec,stageKey:k};
  state.picks[id].checked=!state.picks[id].checked;const r=document.getElementById('rem-'+id);if(r)r.classList.toggle('show',state.picks[id].checked);}
function setRemark(id,v){if(state.picks[id])state.picks[id].remark=v;}
function removeRec(n){state.removed[n]=true;render();}
function arm(rec){state.placing={rec,recruiters:[]};render();}
function cancelPlace(){state.placing={rec:null,recruiters:[]};render();}
function toggleRecruiter(n){const a=state.placing.recruiters;const i=a.indexOf(n);
  if(i>=0)a.splice(i,1);else{if(a.length<2)a.push(n);else{a.shift();a.push(n);}}render();}
function placeOn(key){if(!state.placing.rec||!state.placing.recruiters.length)return;
  state.schedule.push({rec:state.placing.rec,recruiters:[...state.placing.recruiters],date:key});
  state.placing={rec:null,recruiters:[]};render();}
function unschedule(key){state.schedule=state.schedule.filter(s=>s.date!==key);render();}

/* ---------- RENDER ---------- */
function render(){
  renderStepper();
  const r={1:step1,2:step2,3:step3,4:step4,5:step5}[state.step]();
  const last=state.step===5;
  document.getElementById('panel').innerHTML=r+`<div class="footer">
    <button class="btn ghost" onclick="back()" ${state.step===1?'style="visibility:hidden"':''}>← Back</button>
    <button class="btn primary" onclick="${last?'alert(\'Mockup: C-STAR written to SharePoint, Planner tasks created, report sent to company. Single click — Planner never opened.\')':'next()'}">${last?'Submit — One Click':'Next →'}</button></div>`;
}
render();
</script>
</body>
</html>
